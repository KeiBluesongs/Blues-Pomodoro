<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blues Pomodoro</title>
  <style>
    :root {
      --main: #003399;
      --main-dark: #002266;
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.78);
      --panel: rgba(255, 255, 255, 0.12);
      --panel-strong: rgba(255, 255, 255, 0.20);
      --shadow: rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(160deg, var(--main), var(--main-dark));
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .app {
      width: min(460px, 100%);
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 24px 60px var(--shadow);
      backdrop-filter: blur(12px);
    }

    header {
      text-align: center;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.6rem;
      letter-spacing: 0.04em;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .mode-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 22px 0;
    }

    .tab {
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 999px;
      background: transparent;
      color: var(--text);
      padding: 10px 8px;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .tab.active {
      background: var(--text);
      color: var(--main);
      font-weight: 700;
    }

    .timer {
      text-align: center;
      margin: 28px 0 24px;
    }

    .time {
      font-variant-numeric: tabular-nums;
      font-size: clamp(4.2rem, 18vw, 6.8rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .status {
      margin-top: 12px;
      color: var(--muted);
      font-size: 1rem;
      min-height: 1.4em;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 18px;
    }

    button {
      font: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .primary,
    .secondary {
      border-radius: 18px;
      padding: 14px 16px;
      border: none;
      cursor: pointer;
      font-weight: 700;
    }

    .primary {
      background: var(--text);
      color: var(--main);
    }

    .secondary {
      background: var(--panel-strong);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.20);
    }

    .settings {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 20px;
    }

    .setting-label {
      display: block;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 700;
    }

    .stepper {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 56px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      background: rgba(255, 255, 255, 0.10);
      padding: 6px 54px;
    }

    .stepper button {
      position: absolute;
      top: 6px;
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.16);
      color: var(--text);
      font-size: 1.35rem;
      font-weight: 800;
      cursor: pointer;
      line-height: 1;
    }

    .stepper button[data-action="minus"] {
      left: 6px;
    }

    .stepper button[data-action="plus"] {
      right: 6px;
    }

    .stepper button:active {
      background: var(--text);
      color: var(--main);
    }

    .stepper-value {
      display: block;
      width: 100%;
      font-variant-numeric: tabular-nums;
      text-align: center;
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--text);
    }

    .meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.10);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 18px;
      padding: 12px;
      text-align: center;
    }

    .card .number {
      font-size: 1.35rem;
      font-weight: 800;
    }

    .card .label {
      color: var(--muted);
      font-size: 0.8rem;
      margin-top: 3px;
    }

    .notification-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    .small-button {
      border-radius: 16px;
      padding: 12px 14px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.10);
      color: var(--text);
      cursor: pointer;
      font-weight: 700;
    }

    .small-button.active {
      background: var(--text);
      color: var(--main);
    }

    .hint {
      color: var(--muted);
      font-size: 0.72rem;
      line-height: 1.7;
      margin: 24px 6px 4px;
      text-align: center;
    }

    @media (max-width: 420px) {
      body {
        padding: 14px;
      }

      .app {
        padding: 22px;
        border-radius: 24px;
      }

      .mode-tabs {
        grid-template-columns: 1fr;
      }

      .settings {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .controls,
      .notification-row {
        grid-template-columns: 1fr;
      }

      .hint {
        font-size: 0.68rem;
        margin-top: 22px;
      }
    }
  </style>
</head>
<body>
  <main class="app" aria-label="ポモドーロタイマー">
    <header>
      <h1>Blues Pomodoro</h1>
      <p class="subtitle">仕事用ポモドーロタイマー</p>
    </header>

    <section class="mode-tabs" aria-label="モード選択">
      <button class="tab active" data-mode="work">作業</button>
      <button class="tab" data-mode="shortBreak">短い休憩</button>
      <button class="tab" data-mode="longBreak">長い休憩</button>
    </section>

    <section class="timer">
      <div id="time" class="time">25:00</div>
      <div id="status" class="status">作業を始められます</div>
    </section>

    <section class="controls">
      <button id="startPause" class="primary">開始</button>
      <button id="reset" class="secondary">リセット</button>
    </section>

    <section class="settings" aria-label="時間設定">
      <div>
        <span class="setting-label">作業 分</span>
        <div class="stepper" data-mode="work">
          <button type="button" data-action="minus" aria-label="作業時間を1分減らす">−</button>
          <span id="workValue" class="stepper-value">25</span>
          <button type="button" data-action="plus" aria-label="作業時間を1分増やす">＋</button>
        </div>
      </div>
      <div>
        <span class="setting-label">短い休憩 分</span>
        <div class="stepper" data-mode="shortBreak">
          <button type="button" data-action="minus" aria-label="短い休憩を1分減らす">−</button>
          <span id="shortBreakValue" class="stepper-value">5</span>
          <button type="button" data-action="plus" aria-label="短い休憩を1分増やす">＋</button>
        </div>
      </div>
      <div>
        <span class="setting-label">長い休憩 分</span>
        <div class="stepper" data-mode="longBreak">
          <button type="button" data-action="minus" aria-label="長い休憩を1分減らす">−</button>
          <span id="longBreakValue" class="stepper-value">15</span>
          <button type="button" data-action="plus" aria-label="長い休憩を1分増やす">＋</button>
        </div>
      </div>
    </section>

    <section class="meta">
      <div class="card">
        <div id="completed" class="number">0</div>
        <div class="label">完了ポモドーロ</div>
      </div>
      <div class="card">
        <div id="cycle" class="number">4</div>
        <div class="label">長い休憩まで</div>
      </div>
    </section>

    <section class="notification-row" aria-label="通知設定">
      <button id="notifyButton" class="small-button">通知をオン</button>
      <button id="testSound" class="small-button">通知音テスト</button>
    </section>

    <p class="hint">
      終了予定時刻を保存し、再表示時に残り時間を補正します。通知はブラウザが許可した場合のみ表示されます。iPhoneでは画面ロック中の音・通知は保証できません。
    </p>
  </main>

  <script>
    const modes = {
      work: { label: "作業", status: "作業中です", min: 1, max: 180, default: 25 },
      shortBreak: { label: "短い休憩", status: "短い休憩です", min: 1, max: 60, default: 5 },
      longBreak: { label: "長い休憩", status: "長い休憩です", min: 1, max: 120, default: 15 }
    };

    const timeEl = document.getElementById("time");
    const statusEl = document.getElementById("status");
    const startPauseBtn = document.getElementById("startPause");
    const resetBtn = document.getElementById("reset");
    const completedEl = document.getElementById("completed");
    const cycleEl = document.getElementById("cycle");
    const notifyButton = document.getElementById("notifyButton");
    const testSoundBtn = document.getElementById("testSound");

    const valueEls = {
      work: document.getElementById("workValue"),
      shortBreak: document.getElementById("shortBreakValue"),
      longBreak: document.getElementById("longBreakValue")
    };

    let durations = loadDurations();
    let currentMode = localStorage.getItem("currentMode") || "work";
    let remainingSeconds = getMinutes(currentMode) * 60;
    let timerId = null;
    let targetEndTime = Number(localStorage.getItem("targetEndTime") || 0);
    let completedPomodoros = Number(localStorage.getItem("completedPomodoros") || 0);
    let notificationsEnabled = localStorage.getItem("notificationsEnabled") === "true";

    completedEl.textContent = completedPomodoros;
    renderDurations();
    updateCycle();
    updateModeTabs();
    updateNotifyButton();

    const wasRunning = localStorage.getItem("timerRunning") === "true";
    if (wasRunning && targetEndTime > 0) {
      syncRemainingWithClock();
      if (remainingSeconds <= 0) {
        handleCompletedTimer(true);
      } else {
        startTimer(true);
        statusEl.textContent = "保存された終了予定時刻から再開しました";
      }
    } else {
      remainingSeconds = getMinutes(currentMode) * 60;
    }
    render();

    document.querySelectorAll(".tab").forEach(button => {
      button.addEventListener("click", () => {
        switchMode(button.dataset.mode, true);
      });
    });

    document.querySelectorAll(".stepper button").forEach(button => {
      button.addEventListener("click", () => {
        const wrapper = button.closest(".stepper");
        const mode = wrapper.dataset.mode;
        const action = button.dataset.action;
        const delta = action === "plus" ? 1 : -1;
        adjustDuration(mode, delta);
      });
    });

    startPauseBtn.addEventListener("click", () => {
      if (timerId) {
        pauseTimer();
      } else {
        startTimer(false);
      }
    });

    resetBtn.addEventListener("click", () => {
      pauseTimer();
      remainingSeconds = getMinutes(currentMode) * 60;
      statusEl.textContent = `${modes[currentMode].label}をリセットしました`;
      render();
    });

    notifyButton.addEventListener("click", async () => {
      if (!("Notification" in window)) {
        statusEl.textContent = "このブラウザは通知に対応していません";
        return;
      }

      if (Notification.permission === "granted") {
        notificationsEnabled = !notificationsEnabled;
        localStorage.setItem("notificationsEnabled", String(notificationsEnabled));
        updateNotifyButton();
        statusEl.textContent = notificationsEnabled ? "通知をオンにしました" : "通知をオフにしました";
        return;
      }

      if (Notification.permission === "denied") {
        statusEl.textContent = "通知がブラウザ側で拒否されています";
        return;
      }

      const permission = await Notification.requestPermission();
      notificationsEnabled = permission === "granted";
      localStorage.setItem("notificationsEnabled", String(notificationsEnabled));
      updateNotifyButton();
      statusEl.textContent = notificationsEnabled ? "通知をオンにしました" : "通知は許可されませんでした";
    });

    testSoundBtn.addEventListener("click", () => {
      playHappySound();
      showNotification("Blues Pomodoro", "通知テストです");
    });

    window.addEventListener("focus", checkSavedEndTime);
    window.addEventListener("pageshow", checkSavedEndTime);
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) {
        checkSavedEndTime();
      }
    });

    function startTimer(resume) {
      if (!resume) {
        targetEndTime = Date.now() + remainingSeconds * 1000;
        saveTimerState(true);
      }

      clearInterval(timerId);
      startPauseBtn.textContent = "一時停止";
      statusEl.textContent = modes[currentMode].status;

      timerId = setInterval(() => {
        syncRemainingWithClock();
        render();

        if (remainingSeconds <= 0) {
          handleCompletedTimer(false);
        }
      }, 250);
    }

    function pauseTimer() {
      clearInterval(timerId);
      timerId = null;
      targetEndTime = 0;
      saveTimerState(false);
      startPauseBtn.textContent = "開始";
      if (remainingSeconds > 0) {
        statusEl.textContent = "一時停止中です";
      }
    }

    function handleCompletedTimer(wasRestored) {
      clearInterval(timerId);
      timerId = null;
      saveTimerState(false);
      startPauseBtn.textContent = "開始";

      if (!wasRestored) {
        playHappySound();
      }

      if (currentMode === "work") {
        completedPomodoros += 1;
        localStorage.setItem("completedPomodoros", String(completedPomodoros));
        completedEl.textContent = completedPomodoros;
        updateCycle();

        const nextMode = completedPomodoros % 4 === 0 ? "longBreak" : "shortBreak";
        switchMode(nextMode, false);
        statusEl.textContent = wasRestored
          ? "作業時間は経過していました。休憩に入れます。"
          : "作業完了。休憩に入れます。";
        showNotification("作業完了", "休憩に入りましょう。");
      } else {
        switchMode("work", false);
        statusEl.textContent = wasRestored
          ? "休憩時間は経過していました。次の作業に入れます。"
          : "休憩完了。次の作業に入れます。";
        showNotification("休憩完了", "次の作業に入りましょう。");
      }

      render();
    }

    function switchMode(mode, manual) {
      currentMode = mode;
      localStorage.setItem("currentMode", currentMode);
      remainingSeconds = getMinutes(mode) * 60;
      updateModeTabs();

      if (manual) {
        pauseTimer();
        statusEl.textContent = `${modes[mode].label}モードです`;
      }

      render();
    }

    function checkSavedEndTime() {
      if (localStorage.getItem("timerRunning") !== "true") return;
      targetEndTime = Number(localStorage.getItem("targetEndTime") || 0);
      if (!targetEndTime) return;

      syncRemainingWithClock();
      if (remainingSeconds <= 0) {
        handleCompletedTimer(true);
      } else {
        render();
      }
    }

    function syncRemainingWithClock() {
      if (!targetEndTime) return;
      remainingSeconds = Math.max(0, Math.ceil((targetEndTime - Date.now()) / 1000));
    }

    function saveTimerState(isRunning) {
      localStorage.setItem("timerRunning", String(isRunning));
      localStorage.setItem("currentMode", currentMode);

      if (isRunning) {
        localStorage.setItem("targetEndTime", String(targetEndTime));
      } else {
        localStorage.removeItem("targetEndTime");
      }
    }

    function adjustDuration(mode, delta) {
      const next = clamp(durations[mode] + delta, modes[mode].min, modes[mode].max);
      durations[mode] = next;
      localStorage.setItem("durations", JSON.stringify(durations));
      renderDurations();

      if (!timerId && currentMode === mode) {
        remainingSeconds = getMinutes(mode) * 60;
        render();
      }
    }

    function loadDurations() {
      try {
        const saved = JSON.parse(localStorage.getItem("durations") || "{}");
        return {
          work: clamp(Number(saved.work) || modes.work.default, modes.work.min, modes.work.max),
          shortBreak: clamp(Number(saved.shortBreak) || modes.shortBreak.default, modes.shortBreak.min, modes.shortBreak.max),
          longBreak: clamp(Number(saved.longBreak) || modes.longBreak.default, modes.longBreak.min, modes.longBreak.max)
        };
      } catch {
        return {
          work: modes.work.default,
          shortBreak: modes.shortBreak.default,
          longBreak: modes.longBreak.default
        };
      }
    }

    function renderDurations() {
      valueEls.work.textContent = durations.work;
      valueEls.shortBreak.textContent = durations.shortBreak;
      valueEls.longBreak.textContent = durations.longBreak;
    }

    function render() {
      const minutes = Math.floor(remainingSeconds / 60);
      const seconds = remainingSeconds % 60;
      timeEl.textContent = `${pad(minutes)}:${pad(seconds)}`;
      document.title = `${timeEl.textContent} - ${modes[currentMode].label}`;
    }

    function updateModeTabs() {
      document.querySelectorAll(".tab").forEach(button => {
        button.classList.toggle("active", button.dataset.mode === currentMode);
      });
    }

    function getMinutes(mode) {
      return durations[mode] || modes[mode].default;
    }

    function updateCycle() {
      const doneInCycle = completedPomodoros % 4;
      cycleEl.textContent = doneInCycle === 0 ? 4 : 4 - doneInCycle;
    }

    function pad(number) {
      return String(number).padStart(2, "0");
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, Math.floor(value)));
    }

    function playHappySound() {
      try {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const masterGain = audioContext.createGain();

        masterGain.gain.setValueAtTime(0.75, audioContext.currentTime);
        masterGain.connect(audioContext.destination);

        const notes = [
          { frequency: 523.25, start: 0.00, duration: 0.24 },
          { frequency: 659.25, start: 0.20, duration: 0.24 },
          { frequency: 783.99, start: 0.40, duration: 0.26 },
          { frequency: 1046.50, start: 0.64, duration: 0.38 }
        ];

        notes.forEach(note => {
          const oscillator = audioContext.createOscillator();
          const gain = audioContext.createGain();

          oscillator.type = "sine";
          oscillator.frequency.value = note.frequency;

          const startTime = audioContext.currentTime + note.start;
          const endTime = startTime + note.duration;

          gain.gain.setValueAtTime(0.001, startTime);
          gain.gain.exponentialRampToValueAtTime(0.18, startTime + 0.035);
          gain.gain.exponentialRampToValueAtTime(0.001, endTime);

          oscillator.connect(gain);
          gain.connect(masterGain);
          oscillator.start(startTime);
          oscillator.stop(endTime + 0.04);
        });
      } catch (error) {
        statusEl.textContent = "通知音を再生できませんでした";
      }
    }

    function showNotification(title, body) {
      if (!notificationsEnabled) return;
      if (!("Notification" in window)) return;
      if (Notification.permission !== "granted") return;

      try {
        new Notification(title, {
          body,
          tag: "blues-pomodoro",
          renotify: true
        });
      } catch (error) {
        statusEl.textContent = "通知を表示できませんでした";
      }
    }

    function updateNotifyButton() {
      if (!("Notification" in window)) {
        notifyButton.textContent = "通知非対応";
        notifyButton.classList.remove("active");
        return;
      }

      if (Notification.permission === "granted" && notificationsEnabled) {
        notifyButton.textContent = "通知オン";
        notifyButton.classList.add("active");
      } else if (Notification.permission === "denied") {
        notifyButton.textContent = "通知拒否中";
        notifyButton.classList.remove("active");
      } else {
        notifyButton.textContent = "通知をオン";
        notifyButton.classList.remove("active");
      }
    }
  </script>
</body>
</html>
